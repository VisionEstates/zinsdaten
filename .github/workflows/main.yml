name: Zinsen aktualisieren

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zinsen von Bundesbank & EZB abrufen
        run: |
          python3 << 'PYTHON'
          import urllib.request, json
          from datetime import datetime

          result = {
            "updated": datetime.now().strftime("%Y-%m-%d"),
            "source": "Bundesbank BBK01.SU0503 + EZB FM",
            "bauzins_10j": 3.75,
            "ezb_leitzins": 2.40,
            "anschluss_empfehlung": 4.25,
            "hinweis": "Anschluss = aktueller Bauzins + 0,5 % Risikoaufschlag. Automatisch via GitHub Actions."
          }

          try:
            bbk_url = "https://api.bundesbank.de/service/data/BBK_STR/M.BBK01.SU0503.AN.I.ZZ.ZZ.EUR.BB.BB.P?startPeriod=2025-01-01&format=jsondata&detail=dataonly"
            req = urllib.request.Request(bbk_url, headers={"Accept": "application/json", "User-Agent": "Mozilla/5.0"})
            with urllib.request.urlopen(req, timeout=15) as r:
              data = json.loads(r.read())
            series = data["dataSets"][0]["series"]
            sk = list(series.keys())[0]
            obs = series[sk]["observations"]
            keys = sorted(obs.keys(), key=lambda x: int(x), reverse=True)
            for k in keys:
              if obs[k][0] and obs[k][0] > 0:
                result["bauzins_10j"] = round(obs[k][0], 2)
                break
            print(f"Bundesbank OK: {result['bauzins_10j']} %")
          except Exception as e:
            print(f"Bundesbank Fehler: {e} — Fallback 3.75")

          try:
            ecb_url = "https://data-api.ecb.europa.eu/service/data/FM/B.U2.EUR.RT0.BB.R.1.EUR.2S.A?startPeriod=2025-01-01&format=jsondata&detail=dataonly"
            req2 = urllib.request.Request(ecb_url, headers={"Accept": "application/json"})
            with urllib.request.urlopen(req2, timeout=15) as r:
              data2 = json.loads(r.read())
            series2 = data2["dataSets"][0]["series"]
            sk2 = list(series2.keys())[0]
            obs2 = series2[sk2]["observations"]
            keys2 = sorted(obs2.keys(), key=lambda x: int(x), reverse=True)
            for k in keys2:
              if obs2[k][0] is not None:
                result["ezb_leitzins"] = round(obs2[k][0], 2)
                break
            print(f"EZB OK: {result['ezb_leitzins']} %")
          except Exception as e:
            print(f"EZB Fehler: {e} — Fallback 2.40")

          if result["bauzins_10j"]:
            raw = result["bauzins_10j"] + 0.5
            result["anschluss_empfehlung"] = round(round(raw * 4) / 4, 2)

          with open("zinsen.json", "w", encoding="utf-8") as f:
            json.dump(result, f, indent=2, ensure_ascii=False)

          print(f"Gespeichert: {json.dumps(result)}")
          PYTHON

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add zinsen.json
          git diff --staged --quiet || git commit -m "Zinsen aktualisiert $(date +%Y-%m-%d)"
          git push origin main
